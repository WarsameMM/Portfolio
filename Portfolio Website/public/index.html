<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Website portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap"
      rel="stylesheet">
    <script src="index.js"></script>
  </head>
  <body>
    <header>
      <h1>Warsame Mahdi's 2025 Website Portfolio</h1>
      <h2>Welcome!</h2>
    </header>
    <section>
      <article id="addname">
        <p>Whats your name?</p>
        <form action="/submit-name" method="post">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
          <button type="submit">Submit</button>
        </form>
      </article>
      <article>
        <span id="rename" class="invis">Double click on name to change.</span>
      </article>
      <p>Click a button to check out one of my websites: </p>
      <button id="btn-1">About Me Website</button>
      <button id="btn-2">Choose Your Own Adventure Website</button>
      <button id="btn-3">DND Random Character Generator Website</button>
      <article id="addbg">
        <p>Add a background to the DND Character Generator:</p>
        <form action="/submit-background" method="post">
          <label for="background">Background:</label>
          <input type="text" id="background" name="background" required>
          <button type="submit">Submit</button>
        </form>
      </article>
    </section>
  </body>
</html>
